name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # ВАЖНО: Даем пайплайну права на запись пакетов (образов) в репозиторий
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Functional Tests (Pytest)
      env:
        DATABASE_URL: postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_NAME }}
      run: |
        pytest test_app.py

    # --- НОВЫЕ ШАГИ ДЛЯ GITHUB PACKAGES ---

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # Этот токен GitHub создает сам!

    - name: Convert repository name to lowercase
      # Docker требует, чтобы имя образа было строго маленькими буквами. 
      # Этот шаг переводит имя репозитория в нижний регистр, чтобы не было ошибок.
      run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

    - name: Build and Push Docker Image
      run: |
        # Формируем правильное имя: ghcr.io/ник/репозиторий
        IMAGE_NAME=ghcr.io/${{ env.REPO }}
        
        # Собираем образ и ставим ему тег latest
        docker build -t $IMAGE_NAME:latest .
        
        # Отправляем образ в GitHub Packages
        docker push $IMAGE_NAME:latest